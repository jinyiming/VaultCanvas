name: vaultcanvas_desktop
description: Cross-platform desktop security tool built with Flutter and Rust.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  desktop_drop: ^0.7.0
  file_selector: ^1.0.4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_rust_bridge: ^2.11.1
  go_router: ^14.2.0

dev_dependencies:
  image: ^4.5.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
